name: test-selective
# Selective test execution — runs only the pytest targets a diff can actually
# observe, via tools/select_tests.py (see docs/contributing/selective-testing.md).
#
# This is the CHEAPEST suite and runs on every PR, selecting ~5–20% of the
# ~2.9k-test suite. Full `tests/sim/` and `tests/integration/` remain manual
# (via sim-mujoco.yml and hal.yml).
# See tools/select_tests.py and tools/test_selection.toml for selection logic.
#
# Speed-up design (in execution order):
#   1. Test selection runs FIRST, before any heavy install step. The selector
#      only needs pydantic + stdlib, so `uv run --isolated --with pydantic`
#      provides it in a few seconds without a full workspace sync.
#   2. FFmpeg and the full `uv sync` are SKIPPED entirely when no tests are
#      selected (docs-only diffs, pure markdown changes, etc.) — saving 1–3 min
#      of pointless setup on every such PR.
#   3. The per-test-root partitions that the selector emits run IN PARALLEL
#      (background &-jobs, results streamed after all groups finish), cutting
#      wall-clock time by the number of partitions.
#   4. A concurrency group cancels stale in-progress runs on the same branch
#      the moment a new push arrives.
#   5. paths-ignore skips the workflow entirely (no runner queued) for
#      documentation-only changes.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      base:
        description: "diff base ref"
        required: false
        default: "origin/master"
      head:
        description: "diff head ref"
        required: false
        default: "HEAD"
  pull_request:
    branches: [master]
    # NB: deliberately NO paths-ignore. `select-and-test` is a REQUIRED status
    # check in the master ruleset, and a required check skipped by a path filter
    # is never reported — GitHub leaves it "Expected" forever and blocks the
    # merge (docs-only PRs could then never merge). So we always trigger: for a
    # docs-only diff the selector finds no affected tests in a few seconds and
    # the job reports success without the heavy uv sync / ffmpeg install.

permissions:
  contents: read

jobs:
  select-and-test:
    runs-on: ubuntu-24.04
    # Pin every native threadpool to a single thread for the WHOLE job as
    # DEFENSE-IN-DEPTH. Several tests fork lerobot's `compute_stats`
    # multiprocessing pool; if the fork lands in an interpreter that already
    # spun up numpy/torch/pyarrow threadpools, a forked child / C-extension
    # `atexit` handler crashes at Python finalization — the process exits
    # non-zero *after* an all-green run (issue #24/#25).
    #
    # NOTE: thread-pinning alone is NOT sufficient — a broad partition that
    # includes a forker still exits non-zero despite these vars (verified on a
    # real run). The reliable fix is RUNNING EACH FORKER ONE-PER-PROCESS via the
    # `isolate_globs` list in tools/test_selection.toml (the selector peels them
    # into `isolated_targets` and the loops below run each alone, in a fresh
    # not-yet-threaded interpreter). These env vars stay as a cheap belt to
    # reduce pollution; isolation is what actually prevents the crash.
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
      RAYON_NUM_THREADS: "1"
      TOKENIZERS_PARALLELISM: "false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Full history so `git diff <base>...<head>` (merge-base) resolves.
          fetch-depth: 0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv python install 3.12

      - name: Resolve diff range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.inputs.base }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.inputs.head }}" >> "$GITHUB_OUTPUT"
          fi

      # Run the selector BEFORE the heavy uv sync and FFmpeg install so we can
      # skip both entirely when nothing is selected (e.g. docs-only diffs).
      # select_tests.py only needs pydantic + stdlib; `--isolated --with pydantic`
      # gives us a tiny ephemeral env in a few seconds — no workspace sync needed.
      - name: Select tests for the diff
        id: select
        run: |
          uv run --isolated --with pydantic --python 3.12 \
            python tools/select_tests.py \
            --base "${{ steps.range.outputs.base }}" \
            --head "${{ steps.range.outputs.head }}" \
            --github-output

      - name: No affected tests
        if: steps.select.outputs.any != 'true'
        run: echo "::notice::No code paths affected by this diff — no tests selected."

      # Everything below is skipped when no tests are selected — saving the
      # ~1–3 min of FFmpeg install + full uv sync for e.g. docs-only PRs.

      # torchcodec (pulled in by the lerobot dataset codec path) dlopen()s
      # FFmpeg's libavutil/libavcodec at runtime. The ubuntu-24.04 image does
      # not ship them, so dataset round-trip tests (python/dataset/tests,
      # test_cli_dataset_from_bag, …) fail with "Could not load libtorchcodec
      # … libavutil.so.* cannot open shared object file" whenever a broad diff
      # selects them. Install FFmpeg (provides libavutil.so.58 → core6).
      - name: Install FFmpeg runtime libs (torchcodec)
        if: steps.select.outputs.any == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python dependencies
        if: steps.select.outputs.any == 'true'
        run: uv sync --frozen --all-packages || uv sync --all-packages

      # Asset fetchers lazily `git clone` a shared cache the first time a
      # description is resolved: `robot_descriptions` (rd: refs) and the openarm
      # v2 fetcher (openarm: refs). The "Run selected targets" step below launches
      # every test-root partition CONCURRENTLY, so a broad diff that selects
      # several asset-resolving tests has them all racing the same first clone:
      # "fatal: Unable to create '…/.git/shallow.lock': File exists" → exit 128.
      # Pre-warm every cache serially here so the parallel partitions only ever
      # read an already-populated cache. The rd: list is DERIVED from the robot
      # manifests (not hand-maintained) so it can never drift behind a new ref —
      # a stale hand-list is what let g1/sawyer URDF clones race in the first
      # place. Warm failures are non-fatal — a missing extra just means that
      # description isn't exercised this run.
      - name: Pre-warm asset caches (robot_descriptions + openarm)
        if: steps.select.outputs.any == 'true'
        run: |
          uv run python - <<'PY'
          import importlib
          import pathlib
          import re

          # Every `rd:<module>` referenced by a robots/*/robot.yaml — URDF and
          # MJCF alike (panda_description AND panda_mj_description clone different
          # repos, so both must warm).
          refs: set[str] = set()
          for mf in pathlib.Path("robots").glob("*/robot.yaml"):
              refs.update(re.findall(r"rd:([a-z0-9_]+)", mf.read_text()))
          for m in sorted(refs):
              try:
                  importlib.import_module(f"robot_descriptions.{m}")
                  print(f"warmed rd:{m}")
              except Exception as exc:  # noqa: BLE001 — best-effort warm
                  print(f"skip rd:{m}: {exc}")

          # openarm: refs use a separate fetcher + cache (~/.cache/openral),
          # not robot_descriptions — warm it too so partitions don't race it.
          try:
              from openral_hal._openarm_v2_assets import ensure_openarm_v2_mjcf

              ensure_openarm_v2_mjcf()
              print("warmed openarm v2")
          except Exception as exc:  # noqa: BLE001 — best-effort warm
              print(f"skip openarm v2: {exc}")
          PY

      - name: Run full suite (blast-radius change)
        if: steps.select.outputs.full_run == 'true'
        run: |
          # `isolated_targets` fork a multiprocessing pool (lerobot
          # compute_stats); run in the broad `tests/unit/` process they crash at
          # interpreter teardown despite passing (issue #24). --ignore them here
          # and run each in its own process below.
          ignore=""
          for t in ${{ steps.select.outputs.isolated_targets }}; do
            ignore="$ignore --ignore=$t"
          done
          rc=0
          # shellcheck disable=SC2086 -- intentional word-splitting of $ignore.
          uv run pytest tests/unit/ $ignore \
            -q -p no:launch_testing -p no:launch_ros || rc=1
          # isolated_targets run one-per-process (issue #24/#25): running each
          # forker ALONE, in a fresh not-yet-threaded interpreter, is what
          # actually prevents the finalization crash. Thread-pinning (job-level
          # `env:`) is only defense-in-depth, so no inline env prefix is needed
          # here anymore.
          for t in ${{ steps.select.outputs.isolated_targets }}; do
            echo "::group::pytest (isolated) ${t}"
            uv run pytest "$t" -q -p no:launch_testing -p no:launch_ros || rc=1
            echo "::endgroup::"
          done
          exit $rc

      - name: Run selected targets
        if: steps.select.outputs.full_run != 'true' && steps.select.outputs.any == 'true'
        run: |
          # Partition targets by their nearest `test`/`tests` directory and run
          # each partition in its OWN pytest process. Two directories named
          # `tests` (e.g. root `tests/` and `python/observability/tests/`) both
          # register their conftest.py under the plugin name `tests.conftest`,
          # so collecting them in a single session aborts with
          # "Plugin already registered under a different name". One invocation
          # per test-root keeps every session collision-free. (--import-mode is
          # already importlib via pyproject addopts; consider_namespace_packages
          # is NOT usable here — it breaks the `from tests.integration...`
          # imports several unit tests rely on.)
          declare -A groups
          for t in ${{ steps.select.outputs.targets }}; do
            root=$(printf '%s\n' "$t" | grep -oE '^.*/tests?(/|$)|^tests?(/|$)' | head -1 | sed 's#/$##')
            [ -z "$root" ] && root="$t"  # no test-root segment → its own group
            groups["$root"]="${groups["$root"]} $t"
          done
          # `isolated_targets` (issue #24) are already excluded from `targets`,
          # but a directory target may still *collect* them — --ignore each from
          # every partition, then run them one-per-process below.
          ignore=""
          for t in ${{ steps.select.outputs.isolated_targets }}; do
            ignore="$ignore --ignore=$t"
          done

          # Launch every test-root partition as a background job so they run
          # concurrently. Each group writes to its own temp log; we stream the
          # output only after all have finished (preserving GitHub log ordering).
          declare -A pids
          declare -A logs
          for root in "${!groups[@]}"; do
            tmplog=$(mktemp)
            logs["$root"]="$tmplog"
            # shellcheck disable=SC2086 -- intentional word-splitting of the
            # space-separated per-group target list and $ignore flags.
            uv run pytest ${groups["$root"]} $ignore \
              -q -p no:launch_testing -p no:launch_ros >"$tmplog" 2>&1 &
            pids["$root"]=$!
          done

          rc=0
          for root in "${!pids[@]}"; do
            wait "${pids[$root]}" || rc=1
            echo "::group::pytest ${root}"
            cat "${logs[$root]}"
            echo "::endgroup::"
          done

          # isolated_targets run one-per-process (issue #24/#25): running each
          # forker ALONE, in a fresh not-yet-threaded interpreter, is what
          # actually prevents the finalization crash. Thread-pinning (job-level
          # `env:`) is only defense-in-depth, so no inline env prefix is needed
          # here anymore.
          for t in ${{ steps.select.outputs.isolated_targets }}; do
            echo "::group::pytest (isolated) ${t}"
            uv run pytest "$t" -q -p no:launch_testing -p no:launch_ros || rc=1
            echo "::endgroup::"
          done
          exit $rc

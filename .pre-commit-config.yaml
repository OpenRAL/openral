repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=2000]
      - id: check-merge-conflict
      - id: detect-private-key
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  # mypy runs as a local hook against the project venv so it can resolve
  # workspace packages (openral_*) and third-party stubs. The mirror
  # mypy hook used an isolated env that could not see the workspace.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (project venv)
        entry: uv run mypy --strict -p openral_core -p openral_cli -p openral_sim
        language: system
        pass_filenames: false
        files: ^python/(core|cli|eval)/
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        files: \.(cpp|hpp|h|c|cc)$
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args:
          - "--ignore-words-list=som,deques,nd,socio-economic,implementors,te,theses,empy,alph"
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

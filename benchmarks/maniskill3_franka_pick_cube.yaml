# ManiSkill3 Franka PickCube benchmark suite.
#
# Companion to `scenes/benchmark/maniskill3_pick_cube.yaml` (single-scene
# eval via `openral benchmark scene`) — same scene + task, but iterated
# as a 10-seed protocol so `openral benchmark run` can produce a
# reproducible RSkillEvalResult for the franka_panda × ManiSkill3
# combination. The shipped rSkill `smolvla-maniskill-franka`
# (Calvert0921/smolvla_franka_liftcube_1000) is the canonical target.
#
# Shape (ADR-0042): bare list of BenchmarkScenes; suite id = filename
# stem ("maniskill3_franka_pick_cube"). Suite-level invariants are
# enforced by :func:`openral_core.raise_on_invalid_suite`.
#
# ADR-0010. Opt-in via `uv sync --group maniskill3`; without the extra
# `openral benchmark run` will fail at lazy import inside the scene
# factory with a typed ROSConfigError pointing at the install command.
#
# Run:
#   uv sync --group maniskill3
#   openral benchmark run --suite maniskill3_franka_pick_cube \
#       --rskill smolvla-maniskill-franka

- scene:
    id: maniskill3
    backend: mujoco       # SAPIEN under the hood; we reuse the mujoco enum slot
    observation_height: 128
    observation_width: 128
    cameras: ["camera1", "camera2"]
    backend_options:
      # smolvla-maniskill-franka emits 8-D joint commands (7 arm + 1 gripper);
      # pd_joint_pos is the matching ManiSkill3 control mode.
      control_mode: pd_joint_pos
      obs_mode: state_dict+rgb
      # The shipped rSkill expects an in-hand wrist camera; the base
      # `panda` MS3 agent only ships the overhead camera, so use the
      # `panda_wristcam` variant which adds the eye-in-hand camera that
      # the franka_panda RobotDescription's `camera2` sensor maps to.
      robot_uids: panda_wristcam
  task:
    id: maniskill3/PickCube-v1
    scene_id: maniskill3
    instruction: "pick up the cube"
    max_steps: 100
    success_key: success
  robot_id: franka_panda
  n_episodes: 10
  seed: 0
  metadata:
    paper: "https://arxiv.org/abs/2410.00425"
    display_name: "ManiSkill3 PickCube (Franka Panda)"
    simulator: "ManiSkill3 (SAPIEN, GPU)"
    honest_scope: >
      10 seeds on PickCube-v1. Bump n_episodes for a paper-equivalent
      reproduction (typically 50 per task in MS3 leaderboards). Paired
      with the in-tree `smolvla-maniskill-franka` rSkill.

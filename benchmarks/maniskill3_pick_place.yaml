# ManiSkill3 pick-and-place benchmark suite — two atomic tasks.
#
# ADR-0010. Opt-in via `uv sync --group maniskill3`; without the extra
# `openral benchmark run` will fail at lazy import inside the scene
# factory with a typed ROSConfigError pointing at the install command.
#
# Two-task starter: PickCube + StackCube. Covers grasp + place + stack,
# the canonical sanity-check pair every ManiSkill3 baseline reports.
# 5 seeds/task = 10 total rollouts so the suite is CI-tractable.
#
# Per-task ``max_steps`` differs (PickCube=100, StackCube=200) so the
# runner enforces the budget appropriate to each task; the aggregator
# reports the suite-wide maximum in the headline protocol summary.
#
# Shape (ADR-0042): bare list of BenchmarkScenes; suite id = filename
# stem ("maniskill3_pick_place"). The shared scene + metadata is anchored
# on the first item via &ms3_scene; the second item merges it and only
# overrides the task. Suite-level invariants are enforced by
# :func:`openral_core.raise_on_invalid_suite` — note that
# per-scene ``task.success_key`` / ``task.max_steps`` MAY differ
# (PickCube=100, StackCube=200) which is allowed.
#
# Notes: lightweight 2-task subset of the ManiSkill3 catalogue. Picks
# PickCube and StackCube because they are the two atomic primitives
# every paper starts with; the underlying ManiSkill3 task list is much
# larger and can be extended by adding more BenchmarkScene entries here.
# Success key is "success" — ManiSkill3 reports success under
# info["success"] (per-step boolean OR'd across the episode).
#
# Run:
#   uv sync --group maniskill3
#   openral benchmark run --suite maniskill3_pick_place --rskill placeholder

- &ms3_scene
  scene:
    id: maniskill3
    backend: mujoco       # SAPIEN under the hood; we reuse the mujoco enum slot
    observation_height: 480
    observation_width: 640
    cameras: ["camera1", "camera2"]
    backend_options:
      # ManiSkill3 control modes:
      #   pd_ee_delta_pose   — 6-D end-effector pose delta + gripper
      #   pd_joint_pos       — direct joint targets (8-D: 7 arm + gripper)
      #   pd_joint_delta_pos — joint deltas
      # smolvla-maniskill-franka emits 8-D joint commands, so pd_joint_pos
      # is the matching mode. camera2 (eye-in-hand) comes from the
      # panda_wristcam variant the franka_panda manifest maps.
      control_mode: pd_joint_pos
      obs_mode: state_dict+rgb
  task:
    id: maniskill3/PickCube-v1
    scene_id: maniskill3
    instruction: "pick up the red cube"
    max_steps: 100
    success_key: success
  robot_id: franka_panda
  n_episodes: 5
  seed: 0
  metadata:
    paper: "https://arxiv.org/abs/2410.00425"
    display_name: "ManiSkill3 (pick + stack starter)"
    simulator: "ManiSkill3 (SAPIEN, GPU)"
    honest_scope: >
      5 seeds on each of PickCube-v1 and StackCube-v1 (10 rollouts total).
      CI-tractable starter; bump n_episodes for a paper-equivalent
      reproduction (typically 50 per task in MS3 leaderboards).
- <<: *ms3_scene
  task:
    id: maniskill3/StackCube-v1
    scene_id: maniskill3
    instruction: "stack the red cube on the green cube"
    max_steps: 200
    success_key: success

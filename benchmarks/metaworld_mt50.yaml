# MetaWorld MT50 benchmark suite — 50 manipulation tasks.
#
# Mirrors the MT50 setting from Yu et al., 2019 (arXiv:1910.10897). The
# 50 task names match lerobot's TASK_NAME_TO_ID (see
# .venv/lib/python3.12/site-packages/lerobot/envs/metaworld_config.json)
# which in turn matches MetaWorld v3 (post-2024 Metaworld 3.x).
#
# Shape (ADR-0042): bare list of 50 BenchmarkScenes (one per task); suite
# id = filename stem ("metaworld_mt50"). All share the same scene,
# robot, episode budget and provenance — the YAML uses an anchor
# (&mw_scene) to keep the file compact. Each task overrides only its
# id + instruction. Suite-level invariants are enforced by
# :func:`openral_core.raise_on_invalid_suite`.
#
# Protocol: 5 episodes per task = 250 total rollouts. This is lighter
# than the 50-ep/task default in the original paper so the suite finishes
# in under 4h on a single GPU; raise n_episodes to scale up.
#
# Notes: 50 manipulation tasks (assembly, button-press, drawer, faucet,
# hammer, insertion, lever, peg, pick-place, plate, push, reach, sweep,
# window, …). Lighter than the paper protocol (5 seeds/task vs 50) to
# keep the runtime within ~4h on a single GPU; bump n_episodes for a
# paper-equivalent reproduction. The success key is "success" — the
# metaworld env reports it under info["success"], not info["is_success"].
#
# Run:
#   openral benchmark run --suite metaworld_mt50 \
#       --rskill smolvla-metaworld

- &mw_scene
  scene:
    id: metaworld
    backend: mujoco
    observation_height: 256
    observation_width: 256
    cameras: ["front"]
  task: &task_proto
    id: metaworld/assembly-v3
    scene_id: metaworld
    instruction: "assemble the nut onto the peg"
    max_steps: 500          # MetaWorld max_path_length (official fixed horizon)
    success_key: success
  robot_id: sawyer
  n_episodes: 5
  seed: 0
  metadata:
    paper: "https://arxiv.org/abs/1910.10897"
    display_name: "MetaWorld MT50"
    simulator: "MetaWorld v3 (MuJoCo via lerobot)"
    honest_scope: >
      5 episodes per task across all 50 MetaWorld MT50 tasks
      (250 rollouts total). Lighter than the paper protocol
      (5 seeds/task vs 50) to keep the runtime within ~4h on a
      single GPU.
- <<: *mw_scene
  task: { <<: *task_proto, id: metaworld/basketball-v3,                instruction: "dunk the ball into the hoop" }
- <<: *mw_scene
  task: { <<: *task_proto, id: metaworld/bin-picking-v3,               instruction: "pick the cube from the red bin and place it in the blue bin" }

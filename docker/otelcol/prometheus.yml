# Prometheus scrape config for the dev stack.
#
# Pulls OpenRAL metrics off the otelcol prometheus exporter at
# `otelcol:8889/metrics`. UI at http://localhost:9090/.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otelcol:8889"]

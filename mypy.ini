[mypy]
strict = true
python_version = 3.12
plugins = pydantic.mypy
warn_unused_ignores = true
disallow_untyped_decorators = true
disallow_any_generics = true
no_implicit_reexport = true
namespace_packages = true
explicit_package_bases = true
mypy_path = python

[mypy-tests.*]
disallow_untyped_defs = false

[mypy-rclpy]
ignore_missing_imports = true
follow_imports = skip
disable_error_code = attr-defined,no-untyped-call

[mypy-rclpy.*]
ignore_missing_imports = true
follow_imports = skip
disable_error_code = attr-defined,no-untyped-call

# launch / launch_ros (the ROS 2 Python launch system) ships without a
# ``py.typed`` marker upstream, so any in-tree launch file or launch-side
# test that imports them needs the same ignore stance as ``rclpy``.
[mypy-launch]
ignore_missing_imports = true
follow_imports = skip
disable_error_code = attr-defined,no-untyped-call

[mypy-launch.*]
ignore_missing_imports = true
follow_imports = skip
disable_error_code = attr-defined,no-untyped-call

[mypy-launch_ros]
ignore_missing_imports = true
follow_imports = skip
disable_error_code = attr-defined,no-untyped-call

[mypy-launch_ros.*]
ignore_missing_imports = true
follow_imports = skip
disable_error_code = attr-defined,no-untyped-call

[mypy-sensor_msgs.*]
ignore_missing_imports = true

# sensor_msgs_py (the pure-Python point_cloud2 helpers) is a separate
# top-level module — the ``sensor_msgs.*`` pattern above does not cover it.
[mypy-sensor_msgs_py.*]
ignore_missing_imports = true

# ROS runtime-only IDL / introspection packages imported lazily inside
# try/ImportError blocks (action_msgs.msg.GoalStatus, rosidl_runtime_py
# set_message_fields). Same stance as the message packages above so both
# ROS-sourced and bare-venv mypy runs stay clean.
[mypy-action_msgs.*]
ignore_missing_imports = true

[mypy-rosidl_runtime_py.*]
ignore_missing_imports = true

[mypy-diagnostic_msgs.*]
ignore_missing_imports = true

[mypy-trajectory_msgs.*]
ignore_missing_imports = true

[mypy-lifecycle_msgs.*]
ignore_missing_imports = true

[mypy-std_msgs.*]
ignore_missing_imports = true

[mypy-nav_msgs.*]
ignore_missing_imports = true

[mypy-geometry_msgs.*]
ignore_missing_imports = true

[mypy-rosgraph_msgs.*]
ignore_missing_imports = true

[mypy-tf2_ros]
ignore_missing_imports = true

[mypy-openral_msgs.*]
ignore_missing_imports = true

# openral_safety is a ROS/colcon package under packages/ (not a uv editable like
# openral_sim/hal), so mypy can't resolve it when checking openral_cli — same as
# openral_msgs. The CLI's openral collision command imports its LoweredCollisionModel.
[mypy-openral_safety.*]
ignore_missing_imports = true

[mypy-mujoco.*]
ignore_missing_imports = true

[mypy-lerobot.*]
ignore_missing_imports = true

[mypy-transformers.*]
ignore_missing_imports = true

# OpenCLIP (ADR-0038 §5 open-vocab embedder) — optional `clip` group, no stubs.
# Without the stanza mypy emits import-not-found when the group is absent and
# import-untyped when present; the stanza covers both so the embedder type-checks
# whether or not the heavy clip extra is installed.
[mypy-open_clip]
ignore_missing_imports = true

[mypy-open_clip.*]
ignore_missing_imports = true

[mypy-pyudev]
ignore_missing_imports = true

[mypy-robot_descriptions.*]
ignore_missing_imports = true

[mypy-libero.*]
ignore_missing_imports = true

[mypy-hf_libero.*]
ignore_missing_imports = true

[mypy-robosuite.*]
ignore_missing_imports = true

[mypy-gym_aloha.*]
ignore_missing_imports = true

[mypy-gym_pusht.*]
ignore_missing_imports = true

[mypy-pygame]
ignore_missing_imports = true

[mypy-pygame.*]
ignore_missing_imports = true

[mypy-imageio.*]
ignore_missing_imports = true

[mypy-cv2]
ignore_missing_imports = true

[mypy-gi]
ignore_missing_imports = true

[mypy-gi.*]
ignore_missing_imports = true

[mypy-pycuda]
ignore_missing_imports = true

[mypy-pycuda.*]
ignore_missing_imports = true

[mypy-tensorrt]
ignore_missing_imports = true

[mypy-cuda]
ignore_missing_imports = true

[mypy-cuda.*]
ignore_missing_imports = true

[mypy-bitsandbytes.*]
ignore_missing_imports = true
follow_imports = skip
disable_error_code = attr-defined,no-untyped-call

[mypy-opentelemetry.exporter.*]
ignore_missing_imports = true

# Research / debug scripts under tools/ that pull in upstream libraries
# without published type stubs.
[mypy-robocasa]
ignore_missing_imports = true

[mypy-robocasa.*]
ignore_missing_imports = true

[mypy-openpi_client.*]
ignore_missing_imports = true

[mypy-pandas]
ignore_missing_imports = true

[mypy-pandas.*]
ignore_missing_imports = true

# NVIDIA Isaac Sim sidecar (tools/isaac_*). Isaac ships per-interpreter
# Omniverse wheels that are Python 3.11-only — uninstallable in the 3.12 typing
# env — and carry no stubs; msgpack/zmq are the sidecar wire transport. The
# sidecar prepends tools/ to sys.path so its scene modules import their siblings
# unqualified (isaac_scene / isaac_bowl_plate_scene / _isaac_scene_base), which
# mypy can't resolve off mypy_path. These stanzas suppress the unresolvable
# imports (by their bare import names).
[mypy-isaacsim]
ignore_missing_imports = true

[mypy-isaacsim.*]
ignore_missing_imports = true

# Omniverse Kit (`omni.kit.commands`, used by the robot-agnostic manifest scene
# to run Isaac's URDF importer) ships in the same py3.11-only Isaac wheel set —
# uninstallable in the 3.12 typing env, no stubs.
[mypy-omni]
ignore_missing_imports = true

[mypy-omni.*]
ignore_missing_imports = true

[mypy-msgpack]
ignore_missing_imports = true

[mypy-zmq]
ignore_missing_imports = true

[mypy-_isaac_scene_base]
ignore_missing_imports = true

[mypy-isaac_scene]
ignore_missing_imports = true

[mypy-isaac_bowl_plate_scene]
ignore_missing_imports = true

[mypy-isaac_manifest_scene]
ignore_missing_imports = true

# The scene files (checked as ``tools.<stem>``) subclass the Any-typed
# IsaacSceneBase and return arrays from Any-typed Isaac kinematics calls, so the
# residual no-any-return/misc are pure consequences of the unstubbed dependency.
[mypy-tools.isaac_scene]
disable_error_code = no-any-return, misc

[mypy-tools.isaac_bowl_plate_scene]
disable_error_code = no-any-return, misc

[mypy-tools.isaac_manifest_scene]
disable_error_code = no-any-return, misc

# LocateAnything detector sidecar / demo (tools/*locateanything*) and the
# quantization helper. They drive transformers + PIL through dynamically-typed
# surfaces (Image.LANCZOS, AutoProcessor.from_pretrained, model.generate,
# BitsAndBytesConfig) that mypy sees as untyped or object-typed; the residual
# attr-defined/operator/no-untyped-call/no-any-return/assignment are upstream
# typing friction, not in-tree bugs.
[mypy-tools._locateanything_server]
disable_error_code = no-any-return, attr-defined, operator, no-untyped-call

[mypy-tools.locateanything_infer_demo]
disable_error_code = attr-defined, assignment, no-untyped-call

[mypy-tools.quantize_rskill]
disable_error_code = assignment

# Qwen3.5-4B scene-VLM sidecar (tools/*qwen_vlm*, ADR-0047) — direct sibling of
# the LocateAnything sidecar above. qwen_vl_utils ships no stubs, and the script
# drives transformers + PIL through the same dynamically-typed surfaces
# (AutoProcessor.from_pretrained, model.generate / batch_decode,
# BitsAndBytesConfig, Image.LANCZOS) mypy sees as untyped or object-typed. Same
# upstream-typing friction, same stance.
[mypy-qwen_vl_utils]
ignore_missing_imports = true

[mypy-qwen_vl_utils.*]
ignore_missing_imports = true

[mypy-tools._qwen_vlm_server]
disable_error_code = no-any-return, attr-defined, operator, no-untyped-call

[mypy-tools.build_qwen_vlm_nf4_checkpoint]
disable_error_code = no-any-return, attr-defined, operator, no-untyped-call

# Robometer-4B reward-monitor sidecar (tools/*robometer*, ADR-0057) — direct
# sibling of the qwen-vlm / locateanything sidecars. The upstream `robometer`
# package ships no stubs, and the scripts drive torch.nn / bitsandbytes through
# dynamically-typed surfaces (named_modules, register_buffer, Params4bit) mypy
# sees as object/untyped. `_robometer_quant` is imported unqualified as a sibling
# (tools/ is not on mypy_path), like the isaac scene modules.
[mypy-robometer]
ignore_missing_imports = true

[mypy-robometer.*]
ignore_missing_imports = true

[mypy-_robometer_quant]
ignore_missing_imports = true

[mypy-tools._robometer_quant]
disable_error_code = attr-defined, union-attr, no-untyped-call, no-any-return, type-arg, call-overload, arg-type

[mypy-tools._robometer_server]
disable_error_code = no-any-return, attr-defined, operator, no-untyped-call, type-arg

[mypy-tools.build_robometer_nf4_checkpoint]
disable_error_code = no-any-return, attr-defined, operator, no-untyped-call, type-arg

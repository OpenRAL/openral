# No end-effector in this menagerie variant — wrist endpoints are
# bare.  A future `g1_with_hands` revision would add Inspire / Dex-3
# entries here.
end_effectors: []

capabilities:
  locomotion: ["bipedal"]
  can_lift_kg: 3.0
  has_dexterous_hands: false
  has_tactile: false
  has_force_control: true
  has_vision: false
  has_lidar: false
  has_audio: false
  bimanual: true
  supported_control_modes:
    - "joint_position"
  supported_vla_embodiments:
    - "g1"
    - "humanoid_everyday_g1"
  embodiment_tags:
    - "g1"
    - "unitree_g1"
    - "humanoid"

safety:
  max_ee_speed_m_s: 1.5
  max_joint_speed_factor: 0.5
  max_force_n: 100.0
  max_torque_nm: 88.0
  deadman_required: true

# `sdk_kind: open` because the menagerie MJCF + the `mujoco` Python
# package are both Apache-2.0; the sim HAL needs no closed driver.
# A future `G1RealHAL` over `unitree_sdk2` (BSD-3, closed-with-api
# per CLAUDE.md §7.4) will derive its `RobotDescription` from this
# sim baseline via `make_real_description` and flip the sdk_kind (the
# `hal` block is shared); that's tracked under the M2 milestone (CLAUDE.md §6.2).
sdk_kind: "open"
# ADR-0031 — explicit sim/real HAL entrypoints (resolved by openral_hal.build_hal).
# Sim-only → real: null until the M2 C++ S0 cerebellum (CLAUDE.md §6.2).
hal:
  sim: "openral_hal.g1:G1MujocoHAL"
  real: null

# MuJoCo wiring consumed by ``openral_hal.MujocoArmHAL.from_description``.
# Source: ``unitree_g1/g1.xml`` in mujoco_menagerie.  The G1 MJCF has a
# 6-DoF free joint before the 29 actuated joints, so ``floating_base``
# offsets qpos by 7 (xyz + quat) and qvel by 6 (linear + angular).
# Default 1:1 mapping (with offsets) applies. See ADR-0023.
sim:
  floating_base: true


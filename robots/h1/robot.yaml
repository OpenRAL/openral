# RobotDescription — Unitree H1 humanoid (physical embodiment, sim baseline).
#
# This manifest mirrors `H1_DESCRIPTION` in
# python/hal/src/openral_hal/h1.py (drift guarded by
# tests/unit/test_robot_manifests_match_hal_constants.py).  Joint
# limits + effort caps come from the upstream Unitree H1 URDF /
# mujoco_menagerie verbatim.
#
# The MuJoCo digital twin (`H1MujocoHAL`) is the only execution path
# available today.  A real-HW HAL over `unitree_sdk2` is the M2
# milestone (CLAUDE.md §6.2) and requires a C++ S0 cerebellar
# controller before a Python HAL becomes useful.
#
# Without an S0 balance controller the digital twin is a contract
# validator only — it falls over under gravity.  The closed-loop
# sim tests in tests/sim/test_h1_hal_mujoco.py run with
# gravity_enabled=False for that reason.
#
# Joint inventory (19 actuated joints — H1 is coarser-DoF than the G1):
#   - left leg  : hip_yaw, hip_roll, hip_pitch, knee, ankle
#   - right leg : same
#   - torso     : yaw only (no waist roll / pitch)
#   - left arm  : shoulder_pitch, shoulder_roll, shoulder_yaw, elbow
#   - right arm : same
# Total: 5 + 5 + 1 + 4 + 4 = 19.
#
# The floating-base joint at qpos[0..6] is implicit world state and is
# NOT enumerated here — the HAL contract surface is the 19 actuated
# joints only.
#
# Joint names follow the menagerie's H1 convention (no `_joint` suffix),
# distinct from the G1 menagerie's naming.

name: "h1"
embodiment_kind: "humanoid"
base_frame: "pelvis"

# ADR-0027 — robot_state_publisher wiring. URDF root link is ``pelvis``,

# No end-effector on this menagerie variant — wrists aren't actuated.
end_effectors: []

capabilities:
  locomotion: ["bipedal"]
  can_lift_kg: 3.0
  has_dexterous_hands: false
  has_tactile: false
  has_force_control: true
  has_vision: false
  has_lidar: false
  has_audio: false
  bimanual: true
  supported_control_modes:
    - "joint_position"
  supported_vla_embodiments:
    - "h1"
    - "humanoid_everyday_h1"
  embodiment_tags:
    - "h1"
    - "unitree_h1"
    - "humanoid"

safety:
  max_ee_speed_m_s: 1.5
  max_joint_speed_factor: 0.5
  max_force_n: 150.0
  max_torque_nm: 300.0   # H1 knee peak
  deadman_required: true

# `sdk_kind: open` because the menagerie MJCF + the `mujoco` Python
# package are both Apache-2.0.  A future `H1RealHAL` over
# `unitree_sdk2` (BSD-3, closed-with-api per CLAUDE.md §7.4) will
# derive its `RobotDescription` from this sim baseline via
# `make_real_description` and flip the sdk_kind (hal is shared); that's
# tracked under the M2 milestone (CLAUDE.md §6.2).
sdk_kind: "open"
# ADR-0031 — explicit sim/real HAL entrypoints (resolved by openral_hal.build_hal).
# Sim-only → real: null until the M2 C++ S0 cerebellum (CLAUDE.md §6.2).
hal:
  sim: "openral_hal.h1:H1MujocoHAL"
  real: null

# MuJoCo wiring consumed by ``openral_hal.MujocoArmHAL.from_description``.
# Source: ``unitree_h1/h1.xml`` in mujoco_menagerie.  Floating-base
# bipedal — qpos starts at 7 (free joint), qvel at 6.  H1MujocoHAL adds
# a per-step torque hook for the menagerie ``motor`` actuators on top of
# what ``MujocoArmHAL`` provides; the data block here is otherwise
# default. See ADR-0023.
sim:
  mjcf_uri: "robot_descriptions:h1_mj_description"
  floating_base: true


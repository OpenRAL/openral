# RobotDescription — Enactic OpenArm v2 bimanual arm (sim baseline).
#
# This manifest mirrors `OPENARM_DESCRIPTION` in
# python/hal/src/openral_hal/openarm.py (drift guarded by
# tests/unit/test_robot_manifests_match_hal_constants.py).
#
# Joint limits + per-joint kp/kv (in the MJCF) + symmetric finger
# gains come from the upstream `enactic/openarm_mujoco` v2 bimanual
# MJCF — see PR #19 on master.  v2 dropped v1's
# software-PD-on-top-of-torque-motors complexity in favour of
# native <position> actuators with per-class PD gains
# (DM8009: kp=230 kv=2.7; DM4340: kp=190 kv=2.2; DM4310: kp=30 kv=1.5;
# fingers: kp=30 kv=0.2), proper ctrlrange / forcerange, and a
# single driven finger per side (the follower finger tracks via an
# <equality> constraint inside the MJCF).
#
# The HAL fetches the v2 MJCF lazily via
# `openral_hal._openarm_v2_assets.ensure_openarm_v2_mjcf` because
# the `robot_descriptions` package still pins to a pre-v2 commit;
# the helper can be removed once upstream bumps.
#
# A real-HW HAL wrapping lerobot's upstream OpenArm driver (see
# huggingface.co/docs/lerobot/openarm) is a planned follow-up; both
# share this manifest.

name: "openarm_v2"
embodiment_kind: "bimanual"
base_frame: "openarm_base"

# ADR-0027 — robot_state_publisher: `assets.urdf` deliberately unset.
# Upstream URDF + xacro live at github.com/enactic/openarm_description
# (single-arm) and github.com/reazon-research/openarm_ros2
# (bimanual bringup); both require xacro processing at launch time
# which sim_e2e.launch.py does not yet support. The
# `robot_descriptions` Python package ships only
# `openarm_v1_mj_description` (MJCF). Wire one of these once a
# wrapped-task-space VLA targets openarm.

# ADR-0058 — unified asset block. Vendored URDF + bimanual MJCF.

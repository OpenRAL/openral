# RobotDescription — Hugging Face SO-100 follower (real + sim).
#
# This is the embodiment used by ``openral_hal.so100_sim.SO100DigitalTwin``
# and by physical SO-100 hardware. The arm has 5 servo joints + a 1-DoF
# gripper, all driven over a USB serial bus by Feetech motors.
#
# Joint kinematic detail is taken from the public SO-100 URDF in
# ``robot_descriptions`` / mujoco_menagerie. ``position_limits`` are in
# radians despite the lerobot SDK exposing degrees — OpenRAL keeps the
# URDF-native units.

name: "so100_follower"
embodiment_kind: "manipulator"

base_frame: "base"

# ADR-0027 — robot_state_publisher wiring. `robot_descriptions` ships
# the SO-ARM100 URDF (cloned from github.com/TheRobotStudio/SO-ARM100
# on first import); root link is ``base``, matching our base_frame.
# ADR-0057 — unified asset block (URDF / MJCF).
assets:
  urdf:
    ref: "rd:so_arm100_description"
  mjcf: "rd:so_arm100_mj_description"

joints:
  - name: "shoulder_pan"
    origin_xyz: [0, -0.0452, 0.0165]
    origin_rpy: [1.57079, 0, 0]
    axis_xyz: [0, 1, 0]
    joint_type: "revolute"
    parent_link: "base"
    child_link: "shoulder"
    position_limits: [-2.0944, 2.0944]
    velocity_limit: 4.5
    effort_limit: 5.0
    actuator_kind: "servo"
  - name: "shoulder_lift"
    origin_xyz: [0, 0.1025, 0.0306]
    origin_rpy: [-1.8, 0, 0]
    axis_xyz: [1, 0, 0]
    joint_type: "revolute"
    parent_link: "shoulder"
    child_link: "upper_arm"
    position_limits: [-1.7453, 1.7453]
    velocity_limit: 4.5
    effort_limit: 5.0
    actuator_kind: "servo"
  - name: "elbow_flex"
    origin_xyz: [0, 0.11257, 0.028]
    origin_rpy: [1.57079, 0, 0]
    axis_xyz: [1, 0, 0]
    joint_type: "revolute"
    parent_link: "upper_arm"
    child_link: "lower_arm"
    position_limits: [-1.7453, 1.7453]
    velocity_limit: 4.5
    effort_limit: 5.0
    actuator_kind: "servo"
  - name: "wrist_flex"
    origin_xyz: [0, 0.0052, 0.1349]
    origin_rpy: [-1, 0, 0]
    axis_xyz: [1, 0, 0]
    joint_type: "revolute"
    parent_link: "lower_arm"
    child_link: "wrist"
    position_limits: [-1.7453, 1.7453]
    velocity_limit: 4.5
    effort_limit: 3.0
    actuator_kind: "servo"
  - name: "wrist_roll"
    joint_type: "revolute"
    parent_link: "wrist"
    child_link: "gripper_base"
    axis_xyz: [1.0, 0.0, 0.0]
    position_limits: [-3.1416, 3.1416]
    velocity_limit: 4.5
    effort_limit: 3.0
    actuator_kind: "servo"
  - name: "gripper"
    joint_type: "revolute"
    parent_link: "gripper_base"
    child_link: "gripper_finger"
    axis_xyz: [0.0, 0.0, 1.0]
    position_limits: [0.0, 1.5708]
    velocity_limit: 4.5
    effort_limit: 1.5
    actuator_kind: "servo"
    role: "gripper"

end_effectors:
  - name: "gripper"
    kind: "parallel_gripper"
    hand: "right"
    n_dof: 1
    max_grip_force_n: 5.0
    max_payload_kg: 0.5
    workspace_radius_m: 0.32

# SO-100 ships with optional USB cameras. The defaults here mirror the
# convention used by the lerobot SO-100 dataset (``camera1`` = front,
# ``camera2`` = wrist). For the smoketest digital twin no real images
# are produced — the VLA runs against zero tensors.
sensors:
  - name: "front"
    modality: "rgb"
    frame_id: "world"
    rate_hz: 30.0
    intrinsics:
      width: 256
      height: 256
      fx: 192.0
      fy: 192.0
      cx: 128.0
      cy: 128.0
    encoding: "rgb8"
    vla_feature_key: "observation.images.camera1"
    vendor: "generic_usb"
    model: "so100_front"
  - name: "wrist"
    modality: "rgb"
    frame_id: "wrist"
    parent_frame: "wrist_roll"
    rate_hz: 30.0
    intrinsics:
      width: 256
      height: 256
      fx: 192.0
      fy: 192.0
      cx: 128.0
      cy: 128.0
    encoding: "rgb8"
    vla_feature_key: "observation.images.camera2"
    vendor: "generic_usb"
    model: "so100_wrist"

capabilities:
  locomotion: ["none"]
  can_lift_kg: 0.5
  has_dexterous_hands: false
  has_tactile: false
  has_force_control: false
  has_vision: true
  has_lidar: false
  has_audio: false
  bimanual: false
  supported_control_modes:
    - "joint_position"
    - "gripper_position"
  supported_vla_embodiments: ["so100_follower"]
  # ``manipulator`` is already declared in ``embodiment_kind`` above and is
  # intentionally omitted here.
  embodiment_tags:
    - "so100_follower"
    - "lerobot"

safety:
  workspace_box_min_xyz: [-0.4, -0.4, 0.0]
  workspace_box_max_xyz: [0.4, 0.4, 0.6]
  max_ee_speed_m_s: 0.5
  max_ee_accel_m_s2: 2.0
  max_joint_speed_factor: 0.7
  max_force_n: 10.0
  max_torque_nm: 3.0
  deadman_required: true
  contact_force_threshold_n: 5.0

sdk_kind: "open"
# ADR-0031 — explicit sim/real HAL entrypoints (resolved by openral_hal.build_hal).
# sim: null → derive MujocoArmHAL.from_description from the `sim:` block below.
hal:
  sim: null
  real: "openral_hal.so100_follower:SO100FollowerHAL"
  # ADR-0029 — real-HAL construction defaults threaded by build_hal so the
  # manifest-driven lifecycle node needs no bespoke `port` ROS parameter.
  parameters:
    defaults:
      port: "/dev/ttyUSB0"
      calibrate_on_connect: false

# MuJoCo wiring consumed by ``openral_hal.MujocoArmHAL.from_description``.
# Source: ``trs_so_arm100/so_arm100.xml`` in mujoco_menagerie (vendored via
# ``robot_descriptions``). The Jaw joint is revolute and its closed
# position is non-zero (-0.174 rad), so gripper.read_mode is
# ``affine_low_high``.  See ADR-0023.
sim:
  grippers:
    - joint: "gripper"
      ctrl_range: [-0.174, 1.75]
      qpos_addrs: [5]
      qpos_scale: 1.924  # 1.75 - (-0.174); kept for symmetry, unused in affine mode
      read_mode: "affine_low_high"

observation_spec:
  state_key: "observation.state"
  state_shape: [6]
  state_representation: "joint_positions"
  image_flip_180: false

action_spec:
  dim: 6
  representation: "joint_positions"
  control_freq_hz: 30.0

# GENERATED by `openral collision lower` — do not hand-edit.
collision_geometry:
  - link_name: "base"
    shape: { shape: "capsule", radius_m: 0.0636, length_m: 0.1283 }
    origin_xyz_rpy: [-0.0001, -0.0168, 0.0350, 2.3319, -0.0267, -0.0624]
  - link_name: "shoulder"
    shape: { shape: "capsule", radius_m: 0.0450, length_m: 0.1045 }
    origin_xyz_rpy: [0.0011, 0.0447, 0.0175, -1.1030, -0.0260, 0.0160]
  - link_name: "upper_arm"
    shape: { shape: "capsule", radius_m: 0.0401, length_m: 0.1431 }
    origin_xyz_rpy: [0.0027, 0.0592, 0.0010, -1.5989, -0.0153, 0.0158]
  - link_name: "lower_arm"
    shape: { shape: "capsule", radius_m: 0.0384, length_m: 0.1311 }
    origin_xyz_rpy: [0.0021, 0.0020, 0.0534, 3.1338, -0.0050, -1.1440]
  - link_name: "wrist"
    shape: { shape: "capsule", radius_m: 0.0501, length_m: 0.0800 }
    origin_xyz_rpy: [-0.0094, -0.0186, -0.0000, 1.5682, 0.7062, 0.7046]

# GENERATED by `openral collision lower` (source: sampling) — do not hand-edit.
allowed_collision_pairs:
  - [base, shoulder]
  - [lower_arm, upper_arm]
  - [lower_arm, wrist]
  - [shoulder, upper_arm]

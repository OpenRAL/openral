  - link_name: "upper_arm_link"
    shape: { shape: "capsule", radius_m: 0.1581, length_m: 0.7503 }
    origin_xyz_rpy: [-0.2994, 0.0000, 0.2221, -3.1329, -1.5311, 3.1325]
  - link_name: "forearm_link"
    shape: { shape: "capsule", radius_m: 0.0997, length_m: 0.6788 }
    origin_xyz_rpy: [-0.2780, -0.0001, 0.0295, 3.1025, -1.5281, -3.1008]
  - link_name: "wrist_1_link"
    shape: { shape: "capsule", radius_m: 0.0816, length_m: 0.1318 }
    origin_xyz_rpy: [-0.0012, -0.0084, -0.0029, -1.3456, 0.0200, -0.0160]
  - link_name: "wrist_2_link"
    shape: { shape: "capsule", radius_m: 0.0716, length_m: 0.1265 }
    origin_xyz_rpy: [0.0007, 0.0094, 0.0006, -1.6841, -0.0087, 0.0098]
  - link_name: "wrist_3_link"
    shape: { shape: "capsule", radius_m: 0.0561, length_m: 0.0997 }
    origin_xyz_rpy: [0.0007, -0.0036, -0.0158, 1.6662, 0.0052, 0.0057]

# GENERATED by `openral collision lower` (source: srdf) — do not hand-edit.
allowed_collision_pairs:
  - [forearm_link, upper_arm_link]
  - [forearm_link, wrist_1_link]
  - [shoulder_link, upper_arm_link]
  - [shoulder_link, wrist_1_link]
  - [shoulder_link, wrist_2_link]
  - [wrist_1_link, wrist_2_link]
  - [wrist_1_link, wrist_3_link]
  - [wrist_2_link, wrist_3_link]

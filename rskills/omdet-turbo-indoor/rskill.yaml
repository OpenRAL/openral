# rSkill manifest — OmDet-Turbo indoor open-vocabulary detector (kind: detector,
# ADR-0037 2026-06-12 amendment).
#
# Packages `omlab/omdet-turbo-swin-tiny-hf` (Apache-2.0, real-time open-vocabulary
# detector, AutoModelForZeroShotObjectDetection) as an OpenRAL perception producer.
# It runs IN PROCESS under the runtime's own transformers (no sidecar) over a
# FIXED, curated indoor vocabulary (~230 household / kitchen / office /
# manipulation classes). Because the vocabulary never changes, the detector
# behaves like a large closed-vocabulary detector: an unprompted background
# producer that streams ObjectsMetadata to /openral/perception/objects with far
# more than the 80 COCO classes the RT-DETR rSkills cover.
#
# Unlike rskills/locateanything-3b-nf4, this detector is NOT query-driven: there
# is no set_query and the detector node does not subscribe it to
# /openral/perception/detector_query. The reasoner does not retarget it.
#
# LICENSE: weights are Apache-2.0 (omlab OmDet-Turbo public release) — fully
# commercial-safe (CLAUDE.md §1.9), unlike the NVIDIA non-commercial
# LocateAnything weights.

schema_version: "0.1"
name: "OpenRAL/rskill-omdet-turbo-indoor"
version: "0.1.0"
license: "apache-2.0"
role: "s1"
kind: "detector"  # ADR-0037: perception producer; emits ObjectsMetadata, no Action

# ── Compatibility contract ──────────────────────────────────────────────────
# embodiment-agnostic: a perception rSkill (detector/vlm) needs only an RGB
# camera, not a specific robot. The rSkill<->robot gate exempts these kinds
# (loader._EMBODIMENT_AGNOSTIC_KINDS, ADR-0037), so the tag list is empty —
# it matches any robot/scene.
embodiment_tags: ["any"]  # explicit embodiment-agnostic wildcard (ADR-0071)

sensors_required:
  - modality: "rgb"
    min_width: 640
    min_height: 480

# Detectors command no actuators.
actuators_required: []

# ── Runtime / weights ───────────────────────────────────────────────────────
# OmDet-Turbo is a first-class transformers architecture
# (AutoModelForZeroShotObjectDetection), so it loads under the runtime's own
# transformers>=5 and runs in process — no sidecar venv (contrast
# locateanything-3b-nf4, pinned to transformers==4.57.1). fp16 on GPU; CPU is the
# portable fallback for GPU-less hosts / deploy sim.
runtime: "pytorch"
quantization:
  dtype: "fp16"
  backend: "pytorch"
min_vram_gb:
  fp32: 1.0
  fp16: 0.6

weights_uri: "hf://omlab/omdet-turbo-swin-tiny-hf"

chunk_size: 1
latency_budget:
  # OmDet-Turbo (Swin-tiny) is real-time on GPU; a large fixed vocabulary adds
  # text-encoding cost. 200 ms budget covers the per-frame forward on a modest
  # GPU; the detector leg is throttled by the node, not run at full frame rate.
  per_chunk_ms: 200.0

# ── Detector contract (ADR-0037) ────────────────────────────────────────────
# engine: zeroshot_hf selects the in-process Transformers zero-shot backend
# (OmDetTurboDetector / DetectorTier.ZEROSHOT_HF). `labels` is the FIXED
# vocabulary detected every frame — curated indoor / household / manipulation
# objects, a superset of the indoor-relevant COCO classes.
detector:
  engine: "zeroshot_hf"
  # ADR-0051: always-on background producer. Streams ObjectsMetadata into
  # WorldState.detected_objects every frame; the reasoner reads it passively and
  # never prompts it. NOT the on-demand locate_in_view locator (that is
  # locateanything-3b-nf4, mode: on_demand).

# ── Provenance ──────────────────────────────────────────────────────────────
paper_url: "https://arxiv.org/abs/2403.06892"
source_repo: "hf://omlab/omdet-turbo-swin-tiny-hf"

description: >
  OmDet-Turbo (Swin-tiny) real-time open-vocabulary detector, run in-process
  over a fixed curated indoor vocabulary (~230 household/kitchen/office/
  manipulation classes). An unprompted background producer: publishes
  ObjectsMetadata to /openral/perception/objects every frame without reasoner
  prompting, giving the world model far more classes than the 80 COCO
  categories. Apache-2.0 weights from omlab/omdet-turbo-swin-tiny-hf. See
  ADR-0037 (2026-06-12 amendment) for the zeroshot_hf detector engine.

# ADR-0022 — action vocabulary for the reasoner LLM tool palette.
# DETECT signals that this skill is a perception producer.
actions:
  - "detect"

# Representative coverage keywords surfaced to the reasoner (ADR-0051) so it can
# route between "already tracked in world state" and the on-demand locator. The
# full 266-class vocabulary is in `detector.labels`; these are the category
# summary the palette shows the LLM.
objects:
  - "kitchenware (cup, mug, bottle, bowl, plate, pot, pan, kettle, utensils)"
  - "food (fruit, vegetables, bread, packaged food)"
  - "appliances (fridge, microwave, oven, toaster, kettle, TV)"
  - "electronics (laptop, monitor, keyboard, phone, remote, charger, cables)"
  - "furniture (chair, sofa, table, desk, bed, shelf, cabinet, drawer)"
  - "bathroom items (toilet, sink, towel, soap, toothbrush, mirror)"
  - "office and stationery (book, pen, scissors, stapler, folder, notebook)"
  - "cleaning and laundry (broom, mop, bucket, sponge, spray bottle, hamper)"
  - "containers and personal items (box, basket, bag, backpack, keys, glasses)"
  - "tools and hardware (hammer, screwdriver, drill, switch, outlet, door handle)"
  - "clothing and wearables (shoe, hat, glove, jacket)"
  - "toys (teddy bear, doll, ball, blocks)"

scenes:
  - "tabletop"
  - "kitchen"
  - "indoor"
  - "household"
  - "office"
  - "bathroom"

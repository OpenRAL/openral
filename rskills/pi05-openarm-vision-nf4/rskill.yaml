# rSkill manifest — OpenRAL packaging format V1 (CLAUDE.md §6.4)
#
# π0.5 OpenArm v2 bimanual "vision" fine-tune (NF4 quantized).
#
# Source checkpoint:
#   OpenRAL/rskill-pi05-openarm-vision-nf4
#     - flat LeRobot PI05Policy checkpoint (config.json: use_peft=false)
#     - quantization_metadata.json sentinel: nf4 / bitsandbytes / bf16 compute
#     - upstream source (pre-quantization): mddoai/pi05_openarm_vision @ 0170d42
#     - training dataset: mddoai/openarm_2026-05-14_clean
#       (89 episodes, 39k frames, fps=15, robot_type=bi_openarm, 480x640)
#     - robot_type: bi_openarm (matches robots/openarm v2 layout)
#     - 16-D state, 16-D joint-position **absolute** action
#       (use_relative_actions=false; LEFT-FIRST joint order — see
#        action_feature_names in config.json: openarm_left_joint1..7,
#        openarm_left_gripper, openarm_right_joint1..7, openarm_right_gripper)
#     - state + arm-joint action in RADIANS (decoded quantiles align with
#       robots/openarm/robot.yaml's position_limits — e.g.
#       observation.state.q50[L_j4] ≈ 1.65 ↔ joint range [0.0, 2.44346])
#     - 3 cameras at native 480x640: base / left_wrist / right_wrist
#     - chunk_size=50, num_inference_steps=10, QUANTILES normalization
#
# Compared to the sister pi05-openarm-pickplace-120ep-nf4 (right-first,
# degrees, delta arm actions), this checkpoint drops in to the OpenArm
# URDF / robot.yaml WITHOUT permutation or rad↔deg conversion. The
# openarm sim env's defaults (action_layout=left_first, joint_units=radians)
# are correct for it.

# ── Identity ───────────────────────────────────────────────────────────────
schema_version: "0.1"
name: "OpenRAL/rskill-pi05-openarm-vision-nf4"
version: "0.1.0"
license: "apache-2.0"   # pi05_base is `license:gemma` (research use) —
                        # keep this advisory until ADR-0012 weight-license
                        # matrix is wired through the loader.
role: "s1"
kind: "vla"  # ADR-00XX: rSkill kind discriminator. "vla" = learnable Vision-Language-Action policy.

# ── Policy identity ────────────────────────────────────────────────────────
model_family: "pi05"

# ── Compatibility contract ─────────────────────────────────────────────────
embodiment_tags:
  - "openarm"

actions:
  - "pick"
  - "place"
  - "pick_and_place"

# 3 RGB cameras at the dataset's native 480x640. The pi05 preprocessor
# downscales to 224x224 (per config.json image_resolution) before the
# model forward.
sensors_required:
  - modality: "rgb"
    vla_feature_key: "observation.images.base"
    min_width: 640
    min_height: 480
  - modality: "rgb"
    vla_feature_key: "observation.images.left_wrist"
    min_width: 640
    min_height: 480
  - modality: "rgb"
    vla_feature_key: "observation.images.right_wrist"
    min_width: 640
    min_height: 480

# 16-DoF joint-position actions, LEFT-FIRST. Each arm exposes 7
# revolute joints + 1 gripper for 8 DoF per side. Absolute (not delta)
# for both arms and grippers — use_relative_actions=false in
# config.json.
actuators_required:
  - kind: "joint_position"
    n_dof: 8
    vla_action_key: "action.joint.left"
    control_mode_semantics:
      mode: "absolute"
  - kind: "joint_position"
    n_dof: 8
    vla_action_key: "action.joint.right"
    control_mode_semantics:
      mode: "absolute"

# ── Runtime / weights ──────────────────────────────────────────────────────
runtime: "pytorch"
quantization:
  dtype: "int4"          # bitsandbytes nf4 + compute_dtype=bf16
  backend: "pytorch"
min_vram_gb:
  fp32: 18.0
  bf16: 8.0
  int4: 4.0
weights_uri: "hf://OpenRAL/rskill-pi05-openarm-vision-nf4"

# ── Preprocessing ──────────────────────────────────────────────────────────
processors:
  preprocessor_uri: "hf://OpenRAL/rskill-pi05-openarm-vision-nf4/policy_preprocessor.json"
  postprocessor_uri: "hf://OpenRAL/rskill-pi05-openarm-vision-nf4/policy_postprocessor.json"

# Aliases map scene-camera names → checkpoint feature-key short names.
# The pi05 adapter wraps the alias VALUE in `observation.images.{cam}`
# itself, so values stay as bare short names. The mddoai dataset's
# "top" view feeds the model as "base".
image_preprocessing:
  flip_180: false
  flip_vertical: false
  aliases:
    top: "base"
    base: "base"
    left_wrist: "left_wrist"
    right_wrist: "right_wrist"

state_contract:
  # 16-D, LEFT-FIRST (matches config.json action_feature_names AND
  # robots/openarm/robot.yaml joint order).
  dim: 16

# ── Execution semantics ────────────────────────────────────────────────────
chunk_size: 50
latency_budget:
  per_chunk_ms: 1000.0

# ── Provenance ─────────────────────────────────────────────────────────────
paper_url: "https://www.physicalintelligence.company/blog/pi05"
source_repo: "hf://mddoai/pi05_openarm_vision"

description: >
  π0.5 OpenArm v2 bimanual fine-tune trained on
  mddoai/openarm_2026-05-14_clean (89 episodes), NF4-quantized for
  the 8 GiB 4070-mobile dev target. Emits 16-D absolute joint-position
  actions in LEFT-FIRST order, in radians. Drops in to the OpenArm
  URDF without permutation or rad↔deg conversion. Headline numbers
  remain reproduced_locally=false pending `openral benchmark run`.

# ADR-0019 — per-checkpoint action contract.
action_contract:
  dim: 16

# Initial episode pose, decoded from observation.state.q50 in the
# checkpoint's normalizer pack
# (policy_preprocessor_step_2_normalizer_processor.safetensors).
# Units: radians. Order matches this checkpoint's action_feature_names
# (LEFT-FIRST): [L_j1..L_j7, L_grip, R_j1..R_j7, R_grip].
#
# Grippers are in the LeRobot OpenArm SDK's custom motor-encoder space
# (not radians); the env clips them to the position-actuator ctrlrange
# so the qpos stays inside the joint limit.
starting_pose:
  - -0.2166   # L_j1
  - -0.5096   # L_j2
  -  0.1907   # L_j3
  -  1.6533   # L_j4 (elbow ~95°)
  - -0.1098   # L_j5
  - -0.2133   # L_j6
  -  0.1865   # L_j7
  - -0.0386   # L_grip (custom unit → env clips to [0, 0.785])
  -  0.0967   # R_j1
  -  0.6747   # R_j2
  - -0.0740   # R_j3
  -  1.5542   # R_j4 (elbow ~89°)
  -  0.1680   # R_j5
  -  0.1229   # R_j6
  - -0.1761   # R_j7
  - -0.0046   # R_grip

# rSkill manifest — OpenRAL packaging format V1 (CLAUDE.md §6.4)
#
# Pre-quantized nf4 HF-Hub mirror of the community SO-101 pick-place
# π0.5 finetune `HollyTan/pi05_so101_pick_place-v2.2basev2.4_abs_nofreeze_8b`.
# Produced by:
#
#   HF_TOKEN=<write-token> uv run python tools/quantize_rskill.py \
#       --source HollyTan/pi05_so101_pick_place-v2.2basev2.4_abs_nofreeze_8b \
#       --target OpenRAL/rskill-pi05-so101-pickplace-nf4 \
#       --policy-class lerobot.policies.pi05.modeling_pi05.PI05Policy
#
# The HF-backed variant ships the *already-packed* nf4 state dict plus a
# `quantization_metadata.json` sentinel. The pi05 adapter detects the
# sentinel, meta-initialises the policy graph, overlays the prequant
# state via `install_prequantized_linears`, and skips the bf16->nf4
# conversion entirely. The 4.14 B PaliGemma+action-expert graph packs to
# ~4 GiB so it fits on an 8 GiB GPU (bf16 ~8 GiB OOMs there).

# ── Identity ───────────────────────────────────────────────────────────────
schema_version: "0.1"
name: "OpenRAL/rskill-pi05-so101-pickplace-nf4"
version: "0.1.0"
license: "apache-2.0"   # HollyTan checkpoint: code + weights apache-2.0
role: "s1"
kind: "vla"  # ADR-00XX: rSkill kind discriminator. "vla" = learnable Vision-Language-Action policy.

# ── Policy identity ────────────────────────────────────────────────────────
model_family: "pi05"

# ── Compatibility contract ─────────────────────────────────────────────────
# Finetuned on SO-101 teleop, so so101_follower is the validated
# embodiment. so100_follower shares the 6-DoF follower IO contract but
# is intentionally NOT claimed here — it's an unverified transfer, and
# the canonical SO-100 detection profile does not advertise int4 GPU
# support. Add the tag once an SO-100 host validates the nf4 load.
embodiment_tags:
  - "so101_follower"

# The checkpoint ingests three RGB streams (`top` / `wrist` / `front`);
# the canonical so101_follower robot declares two USB cameras
# (`observation.images.camera1` overhead + `observation.images.camera2`
# wrist). A scene that supplies only those two satisfies the minimum robot
# contract — the absent `front` stream is zero-padded by pi05's per-image
# mask. Scenes with a real `front` camera should list it in `scene.cameras`
# so the adapter feeds all three trained image features.
sensors_required:
  - modality: "rgb"
    vla_feature_key: "observation.images.camera1"
    min_width: 224
    min_height: 224
  - modality: "rgb"
    vla_feature_key: "observation.images.camera2"
    min_width: 224
    min_height: 224

# Output side (ADR-0013). For the canonical so101_follower embodiment the
# loader auto-fills n_dof + vla_action_key from robots/so101_follower/robot.yaml.
# The "_abs_" checkpoint emits absolute joint-position targets.
actuators_required:
  - kind: "joint_position"
    control_mode_semantics:
      mode: "absolute"

# ── Runtime / weights ──────────────────────────────────────────────────────
runtime: "pytorch"
quantization:
  # ``int4`` is the OpenRAL `QuantizationDtype` enum value matching
  # bitsandbytes nf4 (compute_dtype bf16, every Linear with >=4M weight
  # elements). The exact bnb scheme is recorded in the upstream
  # `quantization_metadata.json` sentinel the pi05 adapter probes via
  # `detect_prequantized_nf4`.
  dtype: "int4"
  backend: "pytorch"
# Informational VRAM ceilings; CLAUDE.md §11 still forbids silent downcast.
min_vram_gb:
  fp32: 18.0
  bf16: 8.0
  int4: 4.0
weights_uri: "hf://OpenRAL/rskill-pi05-so101-pickplace-nf4"

# ── Preprocessing (all knobs needed to interpret IO) ───────────────────────
processors:
  preprocessor_uri: "hf://OpenRAL/rskill-pi05-so101-pickplace-nf4/policy_preprocessor.json"
  postprocessor_uri: "hf://OpenRAL/rskill-pi05-so101-pickplace-nf4/policy_postprocessor.json"
# lerobot-native SO-101 teleop frames are recorded upright, so no flip is
# applied (unlike the openpi-robocasa path). The aliases map the in-scene
# camera keys onto the checkpoint's own image-feature suffixes; the
# direction is `<scene-cam-key>: <model-feature-suffix>`. The so101_box
# scene emits `oak_top` (overhead) + `wrist`; the model's third `front`
# stream has no scene equivalent and is zero-padded by pi05's image mask.
image_preprocessing:
  flip_180: false
  flip_vertical: false
  aliases:
    oak_top: "top"
    overhead: "top"
    front: "front"
    wrist: "wrist"
state_contract:
  dim: 6

# ── Execution semantics ────────────────────────────────────────────────────
chunk_size: 50
# n_action_steps omitted — equals chunk_size (full chunk replay, π0.5 default).
latency_budget:
  # 4.14 B PaliGemma+expert backbone in nf4; ~same order as pi05-so100's
  # bf16 ceiling. Tighten once a reference-host measurement stabilises.
  per_chunk_ms: 2500.0

# ── Provenance ─────────────────────────────────────────────────────────────
# No locally-reproduced benchmark numbers for this prequant pack.

paper_url: "https://arxiv.org/abs/2410.24164"
source_repo: "hf://HollyTan/pi05_so101_pick_place-v2.2basev2.4_abs_nofreeze_8b"

description: >
  Pre-quantized nf4 mirror of the community π0.5 SO-101 pick-place
  finetune HollyTan/pi05_so101_pick_place-v2.2basev2.4_abs_nofreeze_8b
  (4.14 B PaliGemma + action expert, trained on the
  HollyTan/so101_pick-place-v2.2-100eps dataset, 100 episodes). Emits
  6-DoF absolute joint-position action chunks of length 50 for the
  so101_follower embodiment. Quantized to ~4 GiB so it loads on an 8 GiB
  GPU. Apache-2.0 weights + code.

# ADR-0022 — action vocabulary surfaced to the reasoner LLM tool palette
# so it can pick this skill by what it does (action verb + object + scene).
actions:
  - "pick"
  - "place"
  - "pick_and_place"
# Task-data gate (ADR-0060): this is a pick-PLACE checkpoint. It was NOT trained
# on insertion or pushing, so the benchmark runner refuses the so101_box/
# tube_insertion and tabletop_push/push_to_goal scenes (different task → a
# plausible-looking rollout that cannot succeed) with ROSCapabilityMismatch.
evaluated_tasks: ["so101_box/pick_place"]
objects: []
scenes:
  - "tabletop"

# ADR-0019 — per-checkpoint action contract (consumed by the dataset bridge
# to bind the LeRobot v3 `action` feature shape).
action_contract:
  dim: 6

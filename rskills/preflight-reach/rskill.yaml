# rSkill manifest — preflight-reach (kind: playbook)
#
# A symbolic S2 *decision procedure* the Reasoner reads (not a neural policy):
# before dispatching a manipulation skill, confirm the target is within the
# robot's reachable workspace (using the robot self-model + object pose), and
# stage the base or hand off if it is not. Composes existing read-only +
# actuating reasoner tools; carries no weights and never actuates directly
# (every motion it triggers is an ExecuteRskill → Action chunk → C++ safety
# kernel). See ADR-0071.

schema_version: "0.1"
name: "OpenRAL/rskill-preflight-reach"
version: "0.1.0"
license: "apache-2.0"
role: "s2"
kind: "playbook"

# Embodiment-agnostic — a playbook is gated by capabilities_required, not by a
# specific embodiment. Declared explicitly with the "any" wildcard (never an
# empty list, which the manifest validator rejects — ADR-0071).
embodiment_tags: ["any"]

# Real RobotCapabilities flag: confirming the target's pose requires a camera.
# The loader's capability gate (openral_rskill.loader.check_capability_flags)
# raises ROSCapabilityMismatch on any robot that does not declare
# `has_vision: true`, or on an unknown flag name — so only real capability
# fields belong here. The navigation / staging the SOP performs is gated at
# runtime by the composed tools' own requirements, not by this playbook's flags.
capabilities_required:
  has_vision: true

# A playbook actuates nothing itself.
actuators_required: []

# Required field; pinned to 1 like the perception kinds (no Action rows).
chunk_size: 1

# S2 planning budget (~0.2 Hz tick). CI enforces on the reference host.
latency_budget:
  per_chunk_ms: 5000.0

description: >
  S2 decision procedure: before dispatching a manipulation skill, check the
  target is within the robot's reachable workspace (using the robot self-model +
  object pose) and stage the base or hand off if it is not. Composes
  recall_object, resolve_place, query_scene and NAVIGATE skills. ADR-0071.

# RSkillAction.PLAN — registry/discovery metadata only (a playbook is role s2,
# never an ExecuteSkill dispatch verb).
actions:
  - "plan"

objects:
  - "manipulation target"
scenes:
  - "kitchen"
  - "indoor"

# Provenance citation (a playbook has no weights / upstream model repo, so the
# authoring ADR is the citation — `paper_url`, mirroring the ROS-wrapped skills).
paper_url: "https://github.com/OpenRAL/openral/blob/master/docs/adr/0071-reasoner-playbooks-and-self-maintained-memory.md"

# The playbook decision-procedure contract (ADR-0071).
playbook:
  trigger: "about to dispatch a manipulation skill on a target whose reachability from the current base and arm pose is uncertain"
  body_uri: "./PLAYBOOK.md"
  composes_tools:
    - "recall_object"
    - "resolve_place"
    - "query_scene"
    - "execute_rskill"
    - "emit_prompt"
  done_predicate: "the target is confirmed within the robot's reachable workspace (or the robot has been staged so it is), or the task is handed off"
  max_steps: 8

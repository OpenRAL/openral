# rSkill manifest — OpenRAL packaging format V1 (CLAUDE.md §6.4)
#
# This is the scaffold template consumed by `openral rskill new <id>` and
# `tools/rskill_scaffolder.py`. It is a real, schema-valid manifest:
# `rSkill.from_yaml("rskills/template/rskill.yaml")` succeeds as-is.
#
# Sentinel values rewritten by the scaffolder
# -------------------------------------------
#   TEMPLATE_ORG/rskill-TEMPLATE_ID  →  <owner>/rskill-<id>
#   TEMPLATE_ORG                    →  <owner>
#   TEMPLATE_ID                     →  <id>
#   license                         →  --license value
#   embodiment_tags                 →  [--embodiment-tag value]
#
# The template is modeled on `rskills/pi05-libero-nf4/rskill.yaml` — the
# representative VLA skill in tree — and therefore ships pi0.5-shaped
# policy knobs (`image_preprocessing`, `state_contract`,
# `n_action_steps`, `min_vram_gb`). Strip or edit them if your new
# skill wraps a simpler ACT/Diffusion policy that does not need them.
#
# Field grouping convention (preprocessing knobs sit together):
#   Identity → Policy identity → Compatibility contract →
#   Runtime / weights → Preprocessing → Execution semantics → Provenance.
#
# NOTE: `ral skill new` performs a YAML round-trip (safe_load →
# mutate → safe_dump) and therefore strips inline comments. The
# scaffolded `rskills/<id>/rskill.yaml` will be comment-free; copy the
# explanatory header back if you want it.

# ── Identity ───────────────────────────────────────────────────────────────
schema_version: "0.1"
name: "TEMPLATE_ORG/rskill-TEMPLATE_ID"
version: "0.1.0"
license: "permissive_research"
role: "s1"
kind: "vla"  # ADR-00XX: rSkill kind discriminator. "vla" = learnable Vision-Language-Action policy.

# ── Policy identity ────────────────────────────────────────────────────────
model_family: "pi05"

# ── Compatibility contract ─────────────────────────────────────────────────
embodiment_tags:
  - "franka_panda"

sensors_required:
  - modality: "rgb"
    vla_feature_key: "observation.images.camera1"
    min_width: 224
    min_height: 224
  - modality: "rgb"
    vla_feature_key: "observation.images.camera2"
    min_width: 224
    min_height: 224

# control_mode_semantics is REQUIRED on every actuator entry
# (rSkill self-containment audit, Gap 2). For joint_position kinds the
# minimum is `mode: absolute | delta`; gripper kinds also require
# `gripper_convention`, cartesian kinds also require `reference_frame`.
actuators_required:
  - kind: "joint_position"
    control_mode_semantics:
      mode: "absolute"

# ── Runtime / weights ──────────────────────────────────────────────────────
runtime: "pytorch"
quantization:
  dtype: "bf16"
  backend: "pytorch"
min_vram_gb:
  fp32: 14.0
  bf16: 7.0
weights_uri: "hf://TEMPLATE_ORG/TEMPLATE_ID"

# ── Preprocessing (all knobs needed to interpret IO) ───────────────────────
# REQUIRED for modern lerobot families (smolvla / pi05 / xvla / diffusion /
# rldx); the SmolVLA / ACT adapters download exactly these files via
# hf_hub_download. Only the legacy ACT path (model_family: act with norm
# stats inside model.safetensors) may omit the block.
processors:
  preprocessor_uri: "hf://TEMPLATE_ORG/TEMPLATE_ID/policy_preprocessor.json"
  postprocessor_uri: "hf://TEMPLATE_ORG/TEMPLATE_ID/policy_postprocessor.json"
image_preprocessing:
  flip_180: true
  aliases:
    camera1: "image"
    camera2: "image2"
state_contract:
  dim: 8

# ── Execution semantics ────────────────────────────────────────────────────
chunk_size: 50
# Half-chunk replan (closed-loop replanning every 25 env steps).
n_action_steps: 25
latency_budget:
  per_chunk_ms: 200.0
  # Set warmup_ms / load_ms ONLY if you ship a sim-tier test that calls
  # `openral_rskill.testing.assert_within_budget`. Otherwise omit — the
  # schema default of `None` opts out of that test-side tolerance check.

# ── Provenance ─────────────────────────────────────────────────────────────
paper_url: "https://arxiv.org/abs/2410.24164"
source_repo: "hf://TEMPLATE_ORG/TEMPLATE_ID"

description: >
  Scaffold template generated by `ral skill new`. Edit this description,
  the manifest fields above, and the README.md before publishing. The
  template inherits a pi0.5-shaped baseline (PaliGemma backbone, flow
  matching, two-camera LIBERO contract); strip the
  image_preprocessing / state_contract / min_vram_gb / n_action_steps
  blocks if your policy does not need them.

# ADR-0022 — action vocabulary surfaced to the reasoner LLM tool
# palette so it can pick this skill by what it does (action verb +
# object + scene), not just by its slug.
actions:
  - "pick_and_place"
objects:
  - "object"
scenes:
  - "tabletop"

# ADR-0019 — per-checkpoint action contract (consumed by the dataset bridge
# to bind the LeRobot v3 `action` feature shape).
action_contract:
  dim: 8

# rSkill manifest — verify-outcome (kind: playbook)
#
# A symbolic S2 *decision procedure* the Reasoner reads (not a neural policy):
# after a skill or subtask completes, check whether it ACTUALLY succeeded using
# scene/reward queries before the reasoner proceeds (Inner Monologue closed loop).
# Composes existing read-only + actuating reasoner tools; carries no weights and
# never actuates directly (every motion it triggers is an ExecuteRskill → Action
# chunk → C++ safety kernel). See ADR-0072.

schema_version: "0.1"
name: "OpenRAL/rskill-verify-outcome"
version: "0.1.0"
license: "apache-2.0"
role: "s2"
kind: "playbook"

# Embodiment-agnostic — a playbook is gated by capabilities_required, not by a
# specific embodiment. Declared explicitly with the "any" wildcard (never an
# empty list, which the manifest validator rejects — ADR-0072).
embodiment_tags: ["any"]

# Real RobotCapabilities flag: verifying an outcome requires a camera. The
# loader's capability gate (openral_rskill.loader.check_capability_flags) raises
# ROSCapabilityMismatch on any robot that does not declare `has_vision: true`,
# or on an unknown flag name — so only real capability fields belong here. The
# scene / reward queries the SOP performs are gated at runtime by the composed
# tools' own requirements, not by this playbook's flags.
capabilities_required:
  has_vision: true

# A playbook actuates nothing itself.
actuators_required: []

# Required field; pinned to 1 like the perception kinds (no Action rows).
chunk_size: 1

# S2 planning budget (~0.2 Hz tick). CI enforces on the reference host.
latency_budget:
  per_chunk_ms: 5000.0

description: >
  S2 closed-loop decision procedure (Inner Monologue): after a skill or subtask
  completes, check whether it ACTUALLY succeeded using scene/reward queries
  before the reasoner proceeds. Composes query_scene, query_task_progress,
  locate_in_view, memory_write and emit_prompt. ADR-0072.

# RSkillAction.PLAN — registry/discovery metadata only (a playbook is role s2,
# never an ExecuteSkill dispatch verb).
actions:
  - "plan"

objects:
  - "task outcome"
scenes:
  - "kitchen"
  - "indoor"

# Provenance citation (a playbook has no weights / upstream model repo, so the
# authoring ADR is the citation — `paper_url`, mirroring the ROS-wrapped skills).
paper_url: "https://github.com/OpenRAL/openral/blob/master/docs/adr/0072-reasoner-playbooks-and-self-maintained-memory.md"

# The playbook decision-procedure contract (ADR-0072).
playbook:
  trigger: "a skill or subtask has just completed and its success is not directly observable from the action result"
  body_uri: "./PLAYBOOK.md"
  composes_tools:
    - "query_scene"
    - "query_task_progress"
    - "locate_in_view"
    - "memory_write"
    - "emit_prompt"
  done_predicate: "the outcome is classified success or failure with evidence, and a failure has triggered a replan or handoff"
  max_steps: 6

# LIBERO-Spatial benchmark — franka_panda fixed by the scene registry.
# Run with any LIBERO-compatible rSkill:
#
#   openral benchmark --config scenes/benchmark/libero_spatial.yaml \
#                     --rskill rskill://rskills/smolvla-libero
#
# Setup: CC=/usr/bin/gcc just sync --all-packages --group libero

robot_id: franka_panda

scene:
  id: libero_spatial
  backend: mujoco
  observation_height: 256
  observation_width: 256

task:
  id: libero_spatial/0
  scene_id: libero_spatial
  instruction: ""        # env.task_description from the LIBERO suite overrides this
  success_key: is_success
  max_steps: 220         # OpenVLA run_libero_eval LIBERO-Spatial budget

n_episodes: 50           # OpenVLA protocol: 50 rollouts per task
seed: 42

metadata:
  paper: "https://arxiv.org/abs/2306.03310"
  honest_scope: >
    Task 0 of LIBERO-Spatial (Liu et al., 2306.03310). Official VLA-eval
    protocol (OpenVLA run_libero_eval): 10 tasks × 50 rollouts each (500
    total), max 220 steps/episode for the Spatial suite. Pass
    --task libero_spatial/N (N=0–9) to reproduce per-task numbers.

# LIBERO-Spatial benchmark, xVLA variant — ABSOLUTE end-effector control.
#
# Identical to libero_spatial.yaml except for `backend_options.control_mode:
# absolute`. xVLA emits absolute eef-pose targets (not per-step OSC deltas),
# so the LiberoEnv controller must run in absolute mode; the default shared
# scene leaves control_mode at "relative" (delta) for SmolVLA / π0.5 / rldx1 /
# molmoact2 / GR00T, which would saturate xVLA's absolute targets into a pinned,
# static arm. See python/sim/src/openral_sim/backends/libero.py (control_mode
# is policy-dependent) — this is the post-refactor restoration of the original
# per-pair `xvla_libero_spatial.yaml (abs ctrl)` setting.
#
#   openral benchmark scene --config scenes/benchmark/libero_spatial_xvla.yaml \
#                           --rskill rskills/xvla-libero
#
# Setup: CC=/usr/bin/gcc just sync --all-packages --group libero

robot_id: franka_panda

scene:
  id: libero_spatial
  backend: mujoco
  observation_height: 256
  observation_width: 256
  backend_options:
    control_mode: absolute        # xVLA emits absolute eef targets (not deltas)

task:
  id: libero_spatial/0
  scene_id: libero_spatial
  instruction: ""        # env.task_description from the LIBERO suite overrides this
  success_key: is_success
  max_steps: 100         # canonical LIBERO eval budget

n_episodes: 500
seed: 42

metadata:
  paper: "https://arxiv.org/abs/2309.11500"
  honest_scope: >
    Task 0 of LIBERO-Spatial, xVLA absolute-control variant. The paper evaluates
    10 tasks × 500 episodes each. Pass --task libero_spatial/N (N=0–9) and
    --n-episodes 500 to reproduce per-task numbers.

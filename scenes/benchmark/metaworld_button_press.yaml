# MetaWorld button-press-v3 — Sawyer fixed. Website-demo single scene for the
# MT50 expansion (the full sweep lives in benchmarks/metaworld_mt50.yaml).
# Run: openral benchmark scene --config scenes/benchmark/metaworld_button_press.yaml \
#                        --rskill rskills/smolvla-metaworld
# Setup: uv run pip install metaworld==3.0.0 --no-deps; note MUJOCO_GL=egl.

robot_id: sawyer

scene:
  id: metaworld
  backend: mujoco
  observation_height: 256
  observation_width: 256
  cameras: ["camera1"]

task:
  id: metaworld/button-press-v3
  scene_id: metaworld
  instruction: "press the button"
  success_key: success
  max_steps: 500           # MetaWorld max_path_length (official fixed horizon)

n_episodes: 50             # matches the metaworld_mt50 suite per-task budget
seed: 0

metadata:
  paper: "https://arxiv.org/abs/1910.10897"
  honest_scope: >
    MetaWorld MT50 button-press-v3, solved by the multi-task
    lerobot/smolvla_metaworld checkpoint (trained on metaworld_mt50).
    One of the 50 tasks in benchmarks/metaworld_mt50.yaml; this single
    scene is the website-demo entry. 500-step fixed horizon.

# OpenArm v2 bimanual — tabletop pick-and-place (single-scene benchmark).
#
# Mirrors scenes/sim/openarm_tabletop.yaml (LEFT-FIRST action layout,
# RADIANS units — both match robots/openarm/robot.yaml, so the env
# defaults apply with no overrides) and adds the BenchmarkScene block
# (n_episodes, seed, metadata, task.success_key, task.max_steps) the
# `openral benchmark scene` producer requires.
#
# NOTE: the openarm_robosuite backend does not yet emit a task-success
# signal — `OpenArmTabletopEnv.step` returns `info={"drawer_pos": ...}`
# and no `is_success` (reward shaping / success detection is a follow-up).
# The runner therefore never flips success, so this row always reports
# success_rate=0.0. It is an honest demo-grade rollout of the
# inference + bimanual-dynamics path, NOT a paper-comparable task-success
# claim. `success_key` is set to the conventional `is_success` so the
# eval JSON's protocol string is self-documenting once a detector lands.
#
# Setup: just sync --all-packages --group sim
# Run: openral benchmark scene --config scenes/benchmark/openarm_tabletop.yaml \
#                              --rskill rskills/pi05-openarm-vision-nf4

robot_id: "openarm"

scene:
  id: openarm_tabletop_pnp
  backend: mujoco
  observation_height: 480
  observation_width: 640
  cameras: ["top", "left_wrist", "right_wrist"]
  backend_options:
    render_width: 640
    render_height: 480
    max_steps: 500
    # action_layout / joint_units default to left_first / radians — correct
    # for this checkpoint, so we leave them implicit.

task:
  id: openarm/pnp_cube_to_drawer
  scene_id: openarm_tabletop_pnp
  instruction: "pick the red cube and place it in the drawer"
  success_key: is_success
  max_steps: 500

# ADR-0002 Amendment 3 — mandatory mounting pose for the
# openarm_tabletop_pnp scene. Lift bases above the table top + shift
# forward into the workspace so the 0.6 m arm reach can sweep the
# picking targets (mirrors the openral deploy sim HAL params for openarm).
base_pose:
  xyz: [0.20, 0.0, 0.55]
  quat_xyzw: [0.0, 0.0, 0.0, 1.0]
  frame_id: world

n_episodes: 1
seed: 0

metadata:
  paper: "https://www.physicalintelligence.company/blog/pi05"
  honest_scope: >
    1 episode of openarm_tabletop_pnp (OpenArm v2 bimanual, LEFT-FIRST
    16-D joint-position control, max_steps=500) with the NF4-quantized
    pi05_openarm_vision checkpoint (mddoai/openarm_2026-05-14_clean, 89
    episodes). The openarm_robosuite backend has no success detector yet
    (step() emits only drawer_pos, no is_success), so success_rate is
    always 0.0 — this is an OpenRAL local rollout exercising the vision
    VLA inference + bimanual MuJoCo dynamics path, NOT a paper-comparable
    task-success claim.

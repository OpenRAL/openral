# RoboTwin 2.0 — place_empty_cup (precision place), aloha-agilex, SAPIEN.
# Run: openral benchmark scene --config scenes/benchmark/robotwin_place_empty_cup.yaml \
#                             --rskill rskills/smolvla-robotwin
# Setup: provision the SAPIEN+RoboTwin sidecar venv (ADR-0061).

robot_id: aloha_agilex

scene:
  id: robotwin
  backend: sapien
  observation_height: 256
  observation_width: 256
  cameras: ["camera1", "camera2", "camera3"]

task:
  id: robotwin/place_empty_cup
  scene_id: robotwin
  instruction: "place the empty cup on the cup mat"
  success_key: is_success
  max_steps: 300

n_episodes: 100
seed: 0

metadata:
  paper: "https://arxiv.org/abs/2506.18088"
  display_name: "RoboTwin 2.0 — Place Empty Cup"
  simulator: "RoboTwin 2.0 (SAPIEN), aloha-agilex"
  honest_scope: >
    place_empty_cup (RoboTwin 2.0, Chen et al. 2506.18088). Precision
    place on the aloha-agilex embodiment. Official protocol: 100
    episodes/task, sim built-in success, episode_length=300. Easy
    (demo_clean) setting.

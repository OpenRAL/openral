# SO-101 tabletop cube-push — single-scene benchmark.
#
# Mirrors scenes/sim/tabletop_cube_push.yaml (3-D robot-arm push, NOT
# gym PushT) and adds the BenchmarkScene block (n_episodes, seed, typed
# metadata, task.success_key, task.max_steps) the `openral benchmark
# scene` producer requires. The tabletop_push scene is robot-agnostic;
# robot_id is the flag (so101_follower here).
#
# This is a demo-grade, single-episode rollout of the inference + SO-101
# MuJoCo-push path, NOT a paper-comparable task-success claim. Success is
# the geometric criterion the tabletop_push env emits as
# info["is_success"] (cube centre within the goal disc and still on the
# table).
#
# Setup: just sync --all-packages --group sim
# Run: openral benchmark scene --config scenes/benchmark/tabletop_cube_push.yaml \
#                              --rskill rskills/pi05-so101-pickplace-nf4

robot_id: so101_follower          # the flag — any arm with a `sim.mjcf_uri` works

scene:
  id: tabletop_push
  backend: mujoco
  observation_height: 480
  observation_width: 640
  cameras: ["overhead", "wrist"]
  backend_options:
    # Table: 80 x 80 cm slab, top surface at z = 0 (robot base height).
    table_size_xy: [0.80, 0.80]
    table_top_z: 0.0
    table_center_xy: [0.0, 0.30]

    # SO-101 sits at the world origin (the manifest MJCF's home orientation
    # faces the table).
    robot_base_xyz: [0.0, 0.0, 0.0]
    robot_base_yaw_deg: 0.0

    # 5 cm red cube, ~0.05 kg.
    cube_size: [0.025, 0.025, 0.025]
    cube_mass: 0.05
    cube_spawn_xy_range: [[-0.12, 0.12], [0.16, 0.26]]
    goal_spawn_xy_range: [[-0.12, 0.12], [0.30, 0.42]]
    goal_radius: 0.05
    goal_min_separation: 0.12
    off_table_z_tol: 0.04

    # Wrist camera parented to the SO-101 end-effector body ("gripper").
    wrist_camera_mount_body: "gripper"
    wrist_camera_pos_local: [0.03, -0.02, -0.06]
    wrist_camera_fovy: 75.0

    settle_steps: 5

task:
  id: tabletop_push/push_to_goal
  scene_id: tabletop_push
  instruction: "push the red cube onto the green goal marker"
  max_steps: 300
  success_key: is_success

n_episodes: 1
seed: 42
record_video: false

metadata:
  paper: "https://arxiv.org/abs/2410.24164"
  honest_scope: >
    1 episode of tabletop_push/push_to_goal (SO-101 follower, 6-D
    absolute joint-position control, max_steps=300) with the
    NF4-quantized pi05_so101_pick_place checkpoint
    (OpenRAL/rskill-pi05-so101-pickplace-nf4, mirror of the community
    HollyTan pi05 SO-101 finetune, 100 episodes). Success is the
    geometric tabletop_push criterion exposed as info["is_success"]
    (cube centre within 5 cm of the goal disc and still resting on the
    table). This is an OpenRAL local single-episode rollout exercising
    the pi05 vision-VLA inference + SO-101 MuJoCo-push path, NOT a
    paper-comparable task-success claim — the checkpoint was trained on
    pick-place, not pushing.

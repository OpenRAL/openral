# gym-aloha AlohaTransferCube-v0 — ALOHA bimanual fixed.
# SimScene sibling of scenes/benchmark/aloha_transfer_cube.yaml: the single-
# rollout `openral sim run` shape (no benchmark-only n_episodes/seed/metadata,
# so it loads as a SimScene rather than a BenchmarkScene). Same scene + task as
# the benchmark variant; used by tests/sim/test_dataset_emission.py.
# Run: openral sim run --config scenes/sim/aloha_transfer_cube.yaml \
#                      --rskill rskill://rskills/act-aloha
# Setup: just sync --all-packages --group sim  (set MUJOCO_GL=egl)
#
# No `robot_id:` — the aloha_transfer_cube scene hard-fixes the physics robot
# to `aloha_bimanual`, so `openral sim run` rejects an explicit robot_id (it is
# reserved for free-axis scenes). The benchmark sibling carries robot_id
# because BenchmarkScene requires it; sim scenes omit it.

scene:
  id: aloha_transfer_cube
  backend: mujoco
  observation_height: 480
  observation_width: 640
  cameras: ["top"]

task:
  id: aloha_transfer_cube/0
  scene_id: aloha_transfer_cube
  instruction: "transfer the cube"
  success_key: is_success
  max_steps: 500

# Franka Panda LIBERO pick-and-place — custom BDDL milk target.
#
# A user-authored BDDL that asks the policy to pick the milk carton instead of
# the canonical alphabet soup. Routed through ``franka_libero_custom_bddl`` →
# ``robosuite.OffScreenRenderEnv`` so the policy sees the exact pixel + control
# distribution it was trained against — and HAL tests can exercise the raw
# robosuite ``done``-state desync path. The distractor set + spawn regions follow
# LIBERO's canonical "milk" training distribution so the visual scene stays
# in-distribution for pi0.5-LIBERO and friends.
#
# Run::
#
#     openral sim run --config scenes/sim/franka_libero_pnp.yaml \
#                 --rskill rskills/pi05-libero-nf4
#
# Setup: CC=/usr/bin/gcc just sync --all-packages --group libero
#
# The image-flip / state-dim / camera-keys / n_action_steps knobs live on each
# rSkill manifest (e.g. rskills/pi05-libero-nf4/rskill.yaml). Pass ``--device cpu``
# if the GPU can't hold bf16 pi0.5 alongside the MuJoCo render context.

# robot_id is omitted -- the franka_libero_custom_bddl scene hard-fixes the
# physics robot to ``franka_panda``, so ``openral sim run`` refuses an explicit
# robot_id on this YAML.
scene:
  id: franka_libero_custom_bddl
  backend: mujoco
  observation_height: 256
  observation_width: 256
  backend_options:
    bddl_file: "scenes/sim/franka_libero_pnp.bddl"
    # No init_state_file → robosuite samples spawn positions from each region's
    # range, identical to how LIBERO_Object randomises at reset.

task:
  id: custom_milk/0
  scene_id: franka_libero_custom_bddl
  instruction: ""                  # read from BDDL ``:language`` clause
  max_steps: 300
  success_key: is_success

seed: 42
n_episodes: 1
record_video: true

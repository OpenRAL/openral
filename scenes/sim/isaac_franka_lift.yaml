# Isaac Sim (Omniverse + PhysX + RTX) — Franka lift-cube scene (ADR-0045).
#
# Runs Isaac Lab in an out-of-process py3.11 sidecar (`tools/isaac_sidecar.py`)
# and drives it over ZMQ from the openral py3.12 venv. The heavy Isaac Sim
# install is a separate, externally-provisioned venv — see the README.
#
# Run:
#   uv sync --all-packages --group isaacsim --inexact       # pyzmq+msgpack (openral side)
#   export OPENRAL_ISAAC_SIDECAR_PYTHON=/path/to/isaac-venv/bin/python
#   openral sim run --config scenes/sim/isaac_franka_lift.yaml --rskill rskills/<id>
#
# Requirements: NVIDIA RTX GPU (RT cores; A100/H100 unsupported), ~50 GB disk,
# Isaac Sim 5.1 + Isaac Lab 2.3 in the sidecar venv. First boot pulls the
# Omniverse Kit extension cache (one-time, several minutes).

robot_id: franka_panda

scene:
  id: isaac_sim
  backend: isaacsim          # PhysicsBackend.ISAACSIM — real Omniverse backend
  observation_height: 128    # kept modest for 8 GB-class GPUs (rSkill bumps as needed)
  observation_width: 128
  cameras: ["camera1", "camera2"]   # agent-view + eye-in-hand wrist (IsaacLiftScene)
  backend_options:
    headless: true           # no GUI; RTX renders the cameras offscreen
    host: "127.0.0.1"
    # port omitted on purpose: the isaac backend derives a stable, DISTINCT
    # per-scene port (_scene_default_port). A shared pin (was 5757) let a
    # different Isaac scene adopt this scene's lingering sidecar and serve the
    # wrong layout; the identity-checked ping handshake still guards reuse.
    boot_timeout_s: 1200     # first boot downloads the Kit extension cache
    timeout_ms: 120000       # one PhysX+RTX step is far slower than MuJoCo

task:
  id: isaac_sim/lift_cube
  scene_id: isaac_sim
  instruction: "lift the cube"
  success_key: is_success
  max_steps: 300

n_episodes: 1
seed: 0

metadata:
  adr: "docs/adr/0045-isaac-sim-backend-integration.md"
  honest_scope: >-
    PoC integration scene. Proves the Isaac Sim sidecar wire + PhysX physics +
    RTX camera render through the standard SimRollout seam; not a tuned benchmark.

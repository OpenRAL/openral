resolution-markers = [
    "platform_machine != 'aarch64' and platform_machine != 'arm64' and platform_machine != 'armv7l' and platform_machine != 's390x' and sys_platform == 'linux'",
    "(platform_machine == 'aarch64' and sys_platform == 'linux') or (platform_machine == 'arm64' and sys_platform == 'linux') or (platform_machine == 'armv7l' and sys_platform == 'linux')",
    "platform_machine == 's390x' and sys_platform == 'linux'",
    "platform_machine != 's390x' and sys_platform == 'win32'",
    "platform_machine == 's390x' and sys_platform == 'win32'",
    "platform_machine != 's390x' and sys_platform == 'darwin'",
    "platform_machine == 's390x' and sys_platform == 'darwin'",
    "platform_machine != 's390x' and sys_platform != 'darwin' and sys_platform != 'emscripten' and sys_platform != 'linux' and sys_platform != 'win32'",
    "platform_machine == 's390x' and sys_platform != 'darwin' and sys_platform != 'emscripten' and sys_platform != 'linux' and sys_platform != 'win32'",
    "platform_machine != 's390x' and sys_platform == 'emscripten'",
    "platform_machine == 's390x' and sys_platform == 'emscripten'",
]
dependencies = [
    { name = "mujoco" },
    { name = "numba" },
    { name = "numpy" },
    { name = "opencv-python" },
    { name = "pillow" },
    { name = "pynput" },
    { name = "pytest" },
    { name = "qpsolvers", extra = ["quadprog"], marker = "extra == 'group-17-openral-workspace-robocasa'" },
    { name = "scipy" },
    { name = "termcolor" },
    { name = "tqdm" },
]

